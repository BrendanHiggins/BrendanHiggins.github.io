<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Search</title>
    <meta name="description" content="brendanhiggins.dev">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@picocss/pico@2/css/pico.colors.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@picocss/pico@2/css/pico.jade.min.css">
    <link rel="stylesheet" href="/css/style.css">
   
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0" />
    <link href="https://fonts.googleapis.com/css2?family=Google+Sans+Code:ital,wght@0,300..800;1,300..800&family=Google+Sans+Flex:opsz,wght@6..144,1..1000&display=swap" rel="stylesheet">
    
    <script src="https://kit.fontawesome.com/c66265a3dd.js" crossorigin="anonymous"></script>
    
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png">
    <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png">
    <link rel="apple-touch-icon" href="/favicon.png">

    <script>
        document.addEventListener('alpine:init', () => {
            Alpine.data('lightbox', () => ({
                isOpen: false,
                currentIndex: 0,
                images: [],
                init() {
                    const imgEls = Array.from(document.querySelectorAll('article img')).filter(img => !img.closest('a'));
                    this.images = imgEls.map((img, idx) => {
                        img.addEventListener('click', () => this.open(idx));
                        return {
                            src: img.getAttribute('src'),
                            alt: img.getAttribute('alt') || '',
                            title: img.getAttribute('title') || img.getAttribute('alt') || ''
                        };
                    });
                },
                open(index) {
                    this.currentIndex = index;
                    this.isOpen = true;
                    document.body.style.overflow = 'hidden';
                },
                close() {
                    this.isOpen = false;
                    document.body.style.overflow = '';
                },
                next() {
                    if (this.images.length === 0) return;
                    this.currentIndex = (this.currentIndex + 1) % this.images.length;
                },
                prev() {
                    if (this.images.length === 0) return;
                    this.currentIndex = (this.currentIndex - 1 + this.images.length) % this.images.length;
                },
                get currentImage() {
                    return this.images[this.currentIndex] || {};
                }
            }));
        });
    </script>
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
</head>
<body>

    <main class="container no-bottom-padding">
        
<h1>Search Posts</h1>

<link href="/pagefind/pagefind-ui.css" rel="stylesheet">
<script src="/pagefind/pagefind-ui.js"></script>
<style>
    :root {
        --pagefind-ui-scale: 0.8 !important;;
        --pagefind-ui-primary: var(--pico-primary) !important;;
        --pagefind-ui__result-title: var(--pico-color-jade-500)  !important;; 
        --pagefind-ui-text: var(--pico-color) !important;;
        --pagefind-ui-background: var(--pico-background-color) !important;;
        --pagefind-ui-border: var(--pico-muted-border-color) !important;;
        --pagefind-ui-tag: var(--pico-muted-border-color) !important;;
        --pagefind-ui-border-radius: var(--pico-border-radius) !important;;
        --pagefind-ui-font: var(--pico-font-family) !important;;
    }

    .pagefind-ui__search {
        background-color: var(--pico-form-element-background-color) !important;
        border: var(--pico-border-width) solid var(--pico-border-color) !important;
        color: var(--pico-color-jade-500) !important;

    .pagefind-ui__result-link {

    }

    .pagefind-ui__search-clear {

        font-weight: bold;
    }

    .pagefind-ui__search-input {
        color: var(--pico-color-jade-500) !important;
    }
</style>

<div id="search"></div>

<script>
    window.addEventListener('DOMContentLoaded', (event) => {
        new PagefindUI({ 
            element: "#search", 
            showSubResults: true,
            showImages: false  // no thumbnails
        });
    });
</script>
    </main>

    <!-- Lightbox Modal Component -->
    <div x-data="lightbox" x-show="isOpen" x-cloak @keydown.window.escape="close()" @keydown.window.left="prev()" @keydown.window.right="next()" class="lightbox-overlay" @click.self="close()">
        <button class="lightbox-close" @click="close()" aria-label="Close">&times;</button>

        <button x-show="images.length > 1" class="lightbox-nav lightbox-prev" @click="prev()" aria-label="Previous image">
            <i class="fa-solid fa-chevron-left"></i>
        </button>

        <div class="lightbox-content">
            <img :src="currentImage.src" :alt="currentImage.alt" class="lightbox-image">
            <div class="lightbox-caption" x-show="currentImage.title || currentImage.alt">
                <span x-text="currentImage.title || currentImage.alt"></span>
                <small x-show="images.length > 1" class="lightbox-counter" x-text="` (${currentIndex + 1} / ${images.length})`"></small>
            </div>
        </div>

        <button x-show="images.length > 1" class="lightbox-nav lightbox-next" @click="next()" aria-label="Next image">
            <i class="fa-solid fa-chevron-right"></i>
        </button>
    </div>

    <footer class="container">
        <hr class="hr-no-theme"/>
        <small><em>It is not the critic who counts.</em></small>
        <small>© 2025 brendanhiggins.dev</small>
    </footer>

    <script>
        const ALL_POST_URLS = [
            
                "/posts/books/",
            
                "/posts/instagram-ux/",
            
                "/posts/kf2-serv/",
            
                "/posts/bjj-1/",
            
                "/posts/fb-lego-scams/",
            
                "/posts/lockpick/",
            
                "/posts/covid-cards/",
            
                "/posts/dagapeyeff/",
            
                "/posts/canine-kidney-disease/",
            
                "/posts/oliver/",
            
                "/posts/apathy/",
            
                "/posts/staterank/",
            
                "/posts/bjj-2/",
            
                "/posts/game-dev-as-a-hobby/",
            
                "/posts/family-archivist/",
            
                "/posts/graded-cards/",
            
                "/posts/code-node/",
            
                "/posts/amazon-order-hider/",
            
                "/posts/blogging-11ty/",
            
                "/posts/youtube-channel-hider/",
            
                "/posts/godot-utility-addons/",
            
                "/posts/the-arbiter/",
            
        ];

        function goToRandomPost(e) {
            if (e) e.preventDefault();
            if (!ALL_POST_URLS || ALL_POST_URLS.length === 0) return;
            const currentPath = window.location.pathname.replace(/\/$/, '');
            const availablePosts = ALL_POST_URLS.filter(url => url.replace(/\/$/, '') !== currentPath);
            const pool = availablePosts.length > 0 ? availablePosts : ALL_POST_URLS;
            const randomIndex = Math.floor(Math.random() * pool.length);
            window.location.href = pool[randomIndex];
        }
    </script>

</body>
</html>
